# public-transport-analytics
# docker compose up -d --build

services:

  # ── Main database (pgduckdb) ────────────────────────────────
  db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: transport-db
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transport_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Superset metadata database ──────────────────────────────
  superset-db:
    image: postgres:16
    container_name: transport-superset-db
    environment:
      POSTGRES_USER:     ${SUPERSET_DB_USER}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
      POSTGRES_DB:       ${SUPERSET_DB_NAME}
    volumes:
      - superset_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER:-superset}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Pipeline (ingest + scheduler) ──────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: transport-pipeline
    env_file: .env
    environment:
      DB_HOST:              db
      DB_PORT:              5432
      DB_USER:              ${POSTGRES_USER}
      DB_PASSWORD:          ${POSTGRES_PASSWORD}
      DB_NAME:              ${POSTGRES_DB}
      GPS_URL:              ${GPS_URL}
      GPS_INTERVAL_SEC:     ${GPS_INTERVAL_SEC}
      FUEL_URL:             ${FUEL_URL}
      FUEL_CRON_HOUR:       ${FUEL_CRON_HOUR}
      ELECTRIC_URL:         ${ELECTRIC_URL}
      ALEXELA_URL:          ${ALEXELA_URL}
      GTFS_TLT_URL:         ${GTFS_TLT_URL}
      GTFS_TLT_CRON_DAY:    ${GTFS_TLT_CRON_DAY}
      GTFS_TLT_CRON_HOUR:   ${GTFS_TLT_CRON_HOUR}
      GTFS_ELRON_URL:       ${GTFS_ELRON_URL}
      GTFS_ELRON_CRON_DAY:  ${GTFS_ELRON_CRON_DAY}
      GTFS_ELRON_CRON_HOUR: ${GTFS_ELRON_CRON_HOUR}
      ELRON_RT_URL:         ${ELRON_RT_URL}
      ELRON_INTERVAL_SEC:   ${ELRON_INTERVAL_SEC}
      NIGHT_START_HOUR:     ${NIGHT_START_HOUR}
      NIGHT_END_HOUR:       ${NIGHT_END_HOUR}
      SUPERSET_URL:         http://superset:8088
      LOG_DIR:              /app/logs
      IN_BASE:              /app/IN
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./IN:/app/IN
      - ./logs:/app/logs
    restart: unless-stopped

  # ── dbt transformations ─────────────────────────────────────
  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: transport-dbt
    env_file: .env
    environment:
      DB_HOST:           db
      DB_PORT:           5432
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      DB_NAME:           ${POSTGRES_DB}
      DBT_INTERVAL_MIN:  ${DBT_INTERVAL_MIN}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dbt:/app/dbt
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Superset dashboard ──────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: transport-superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY:     ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_USER:        ${SUPERSET_DB_USER}
      SUPERSET_DB_PASSWORD:    ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME:        ${SUPERSET_DB_NAME}
      SUPERSET_ADMIN_USER:     ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL:    ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_DATABASE_URI:   "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SUPERSET_URL:            http://superset:8088
    ports:
      - "${DASHBOARD_PORT_HOST:-8088}:8088"
    depends_on:
      superset-db:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    restart: unless-stopped

volumes:
  pgdata:
  superset_pgdata:
  superset_home: